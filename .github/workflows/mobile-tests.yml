name: Run API Tests (CI Clean)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🔹 Ensure project root is discoverable (safe even if already works)
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 🔥 CRITICAL FIX: Only run API folder
    - name: Run API tests only
      run: |
        pytest tests/api -m api --alluredir=allure-results

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results