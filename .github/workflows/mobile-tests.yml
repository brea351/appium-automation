name: Run API and Mobile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node.js (for Appium)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium & Drivers
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests with Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        script: |
          # Start Appium server in the background
          appium --log-level info & 
          
          # Wait for Appium to be ready
          timeout 60s bash -c 'until nc -z localhost 4723; do sleep 1; done'
          
          # Run your pytest command
          pytest -m api --alluredir=allure-results

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results