name: Run API and Mobile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # 🔹 Increased job timeout because emulators without KVM on Ubuntu take a long time
    timeout-minutes: 30 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium & Drivers
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests with Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86
        profile: pixel_6
        disable-animations: true
        force-avd-creation: false
        script: |
          # 1. Start Appium in the background
          appium --log-level info & 
          
          # 2. Wait for Appium Server to be ready
          timeout 60s bash -c 'until nc -z localhost 4723; do sleep 1; done'
          echo "Appium Server is up and running!"
          
          # 3. 🔹 NEW: Wait for the emulator to be REALLY ready
          echo "Waiting for emulator to finish booting..."
          adb wait-for-device
          adb shell 'while [[ "$(getprop sys.boot_completed)" != "1" ]]; do sleep 5; done'
          
          # Give the system UI a few extra seconds to settle
          sleep 5
          echo "Emulator is fully ready and settled!"

          # 4. Run your pytest command
          pytest -m "api or mobile" --alluredir=allure-results

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results