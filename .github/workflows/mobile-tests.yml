name: Run API and Mobile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # 🔹 Increase job timeout because emulators without KVM take a long time
    timeout-minutes: 30 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium & Drivers
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests with Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        # 🔹 Required for Ubuntu runners to stay stable
        target: default
        arch: x86
        profile: pixel_6
        disable-animations: true
        force-avd-creation: false
        # 🔹 This is the execution script
        script: |
          # Start Appium server in the background with extra timeout buffer
          appium --log-level info & 
          
          # Wait for Appium to be ready
          timeout 60s bash -c 'until nc -z localhost 4723; do sleep 1; done'
          echo "Appium Server is up and running!"

          # Run pytest with a retry mechanism for flakiness
          pytest -m "api or mobile" --alluredir=allure-results

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results